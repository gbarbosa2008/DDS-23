<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 2</title>
    <link rel="icon" href="https://a.espncdn.com/combiner/i?img=/i/teamlogos/soccer/500/819.png">
</head>

<body>

    <h1>TABELA MALVADÃO</h1>


    <!-- Criando uma tabela -->
    <table border="1">
        <!-- Cabecalho da tabela -->
        <thead>
            <tr>
                <th>NOME</th>
                <th>ITEM</th>
                <th>QUANTIDADE</th>
                <th>PREÇO</th>
            </tr>
        </thead>

        <!-- Corpo da tabela -->
        <tbody>
            <!-- Crio uma linha -->
                 <tr>
                    <!-- Crio uma coluna -->
                    <td> Cristiano </td>
                    <td> Perfume</td>
                    <td> 7 </td>
                    <td> R$777.77</td>
                 </tr>

                 <tr>
                    <td>Nermar</td>
                    <td>Ilha de paqueta</td>
                    <td>1</td>
                    <td>R$ 87 MI</td>
                 </tr>
                 <tr>
                    <td>Pavarado</td>
                    <td>Camisa do malvadão</td>
                    <td>5</td>
                    <td>R$ 768.90</td>
                 </tr>

                 <tr>
                    <!-- Rowsnpan = diz quantas linhas ele deve ocupar -->
                    <td rowspan="2">George  </td>
                    <td>Camisa do palmeiras</td>
                    <td>9</td>
                    <td>R$667</td>
                 </tr>
                 <tr>
                    <td>OI</td>
                    <td>OI</td>
                    <td>OI</td>
                 </tr>
        </tbody>

        <!-- Rodape da tabela -->
        <tfoot>
            <tr> 
                <td colspan="4"> Todos os Direitos reservados &copy; </td>
            </tr>
        </tfoot>


    </table>


</body>

</html>
